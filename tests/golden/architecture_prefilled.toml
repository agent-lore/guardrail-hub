# Architecture model for the "diagrams as tests" guardrail.
#
# Single source of truth for:
#   - the generated component diagram + per-component pages
#   - which modules are scanned for the domain class diagram
#   - the architecture metrics snapshot and its hard budgets
#
# The directional layering contract lives in pyproject.toml
# ([tool.importlinter]); the tiers below document that intent (dependencies must
# only point downward, Entrypoints -> Core -> Foundation) and group the diagram.
#
# `component_of()` matches a module to a component by LONGEST module-prefix.
#
# Generated by `guardrail-hub apply` (kit 1.3.0). Every TODO below must
# be resolved before the guardrail tests pass.

# language selects the dependency-graph frontend: "python" (default, grimp
# import graph) or "cpp" (quoted-#include graph; module names carry
# root_package as a logical prefix and sources live directly under src_layout).
[project]
root_package = "fixture_proj"
src_layout   = "src"
language     = "python"

# One-line description per component, shown at the top of its drill-down page
# (docs/generated/components/<Component>.md). test_component_pages requires one
# for every component in [components].
[component_docs]
Cli    = "TODO: one-line description."
Config = "TODO: one-line description."
Engine = "TODO: one-line description."
Errors = "TODO: one-line description."
Store  = "TODO: one-line description."
Types  = "TODO: one-line description."
Web    = "TODO: one-line description."

[components]
Cli    = ["fixture_proj.cli"]
Config = ["fixture_proj.config"]
Engine = ["fixture_proj.engine"]
Errors = ["fixture_proj.errors"]
Store  = ["fixture_proj.store"]
Types  = ["fixture_proj.types"]
Web    = ["fixture_proj.web"]
# TODO: merge single-module components into real ones where it helps.

# Tiers are for diagram grouping + documentation of the forbidden-import contract.
# Dependencies must only point downward (Entrypoints -> Core -> Foundation).
[tiers]
Entrypoints = ["Cli", "Web"]
Core        = ["Engine", "Store"]
Foundation  = ["Config", "Errors", "Types"]

# Hard architecture budgets, checked by tests/guardrail/test_metrics_budgets.py
# against the metrics snapshot (docs/generated/metrics.md explains each one).
# CI fails if a measured value exceeds its budget. Raising a budget is allowed
# but must be an explicit, reviewed edit to this file; lower a budget after
# improving the code to lock in the gain.
#
# Most budgets should be tight ratchets pinned at today's value (any regression
# fails CI). max_module_lines is the exception: a STOP-LOSS ceiling set a
# little above today's largest module. Ratchet the *count* of oversized modules
# down via modules_over_800_lines instead.
#
# TODO: run `make diagrams`, read the measured values from
# docs/generated/metrics.md, then uncomment and pin:
[budgets]
# cross_component_edges  = TODO  # measured <date>; direction: down
# component_cycles       = TODO
# module_cycles          = TODO
# modules_over_800_lines = TODO
# max_module_lines       = TODO  # stop-loss, a little above today's largest module

# Domain class diagram: which modules to scan for dataclasses / Pydantic models.
# test_domain_model_diagram asserts EVERY public model's module is in include or
# exclude — a new model in an unlisted module fails until it is classified.
#
# TODO: list the modules holding real domain entities in include_modules; put
# settings/error/test-double modules in exclude_modules. The completeness test
# will name every unclassified model until this is done.
[domain]
include_modules = [
]
exclude_modules = [
