# Roster of the canonical kit files. Drift comparison and the installer both
# drive off this list; tests/test_kit_manifest.py asserts it matches the kit/
# directory exactly (both directions).
#
# Roles:
#   core                — required in every kit application; AST-compared
#   adapter-tool-catalog — only when [tool_catalog].include_modules is configured
#   adapter-containers   — only when [containers].stores is configured
#   doc                 — informational; presence-checked, content not compared
#
# alt_paths: historical placements accepted by the drift check (the installer
# always writes the canonical path).

[[files]]
path = "tests/guardrail/_common.py"
role = "core"

