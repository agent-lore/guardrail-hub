<table class="data-table budget-table">
  <thead>
    <tr><th>Budget</th><th class="num">Actual</th><th class="num">Budget</th><th class="num">Headroom</th><th>Status</th></tr>
  </thead>
  <tbody>
    {% for b in snapshot.budgets %}
    <tr>
      <td><code>{{ b.key }}</code></td>
      <td class="num">{{ b.actual if b.actual is not none else "—" }}</td>
      <td class="num">{{ b.budget }}</td>
      <td class="num">{{ b.headroom if b.headroom is not none else "—" }}</td>
      <td><span class="traffic traffic-{{ b.level }}">{{ b.level }}</span></td>
    </tr>
    {% endfor %}
  </tbody>
</table>
