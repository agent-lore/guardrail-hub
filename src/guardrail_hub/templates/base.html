<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Guardrail Hub{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='hub.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='vendor/uplot.min.css') }}">
  </head>
  <body>
    <header class="shell-header">
      <div>
        <a class="brand" href="/">Guardrail Hub</a>
        <span class="environment">kit {{ kit_version }}</span>
      </div>
      <nav aria-label="Primary">
        <a class="{{ 'active' if active_view == 'overview' else '' }}" href="/">Repos</a>
        <a class="{{ 'active' if active_view == 'compare' else '' }}" href="/compare">Compare</a>
        <a class="{{ 'active' if active_view == 'drift' else '' }}" href="/drift">Kit drift</a>
        <form class="refresh-form" method="post" action="/refresh">
          <button type="submit" title="Re-read all checkouts from disk">Refresh</button>
        </form>
      </nav>
    </header>
    <main class="shell-main">
      {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
  </body>
</html>
